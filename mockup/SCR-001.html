<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>SCR-001 관리자 로그인 · 목업</title>
<style>
:root{
  --primary:#2563EB;--primary-hover:#1D4ED8;--primary-weak:#DBEAFE;
  --danger:#DC2626;--danger-weak:#FEE2E2;--success:#16A34A;--warning:#D97706;--info:#0891B2;
  --text:#111827;--muted:#6B7280;--inverse:#fff;
  --border:#D1D5DB;--bg:#fff;--subtle:#F9FAFB;--disabled:#E5E7EB;
  --r-sm:4px;--r-md:8px;--r-lg:12px;
  --sh-sm:0 1px 2px rgba(0,0,0,.06);--sh-md:0 4px 12px rgba(0,0,0,.10);
}
*{box-sizing:border-box}
body{margin:0;font-family:system-ui,-apple-system,"Segoe UI",sans-serif;color:var(--text);background:var(--subtle);font-size:15px;line-height:22px}
/* mockup scaffolding toolbar (not part of product UI) */
.mock-bar{position:sticky;top:0;z-index:50;display:flex;flex-wrap:wrap;gap:8px;align-items:center;padding:8px 16px;background:#111827;color:#fff;font-size:13px}
.mock-bar .lbl{color:#9CA3AF;margin-right:2px}
.mock-bar button{background:#374151;color:#fff;border:1px solid #4B5563;border-radius:4px;padding:4px 10px;font-size:13px;cursor:pointer}
.mock-bar button.active{background:var(--primary);border-color:var(--primary)}
.mock-bar .tag{margin-left:auto;color:#9CA3AF}
/* login layout */
.wrap{min-height:calc(100vh - 40px);display:flex;align-items:center;justify-content:center;padding:48px 16px}
.card{width:100%;max-width:480px;background:var(--bg);border:1px solid var(--border);border-radius:var(--r-md);box-shadow:var(--sh-md);padding:32px 24px}
.brand{font-size:13px;line-height:18px;color:var(--muted);letter-spacing:.02em}
h1{font-size:22px;line-height:30px;font-weight:700;margin:4px 0 24px}
label{display:block;font-size:14px;line-height:20px;font-weight:500;margin-bottom:6px}
.field{margin-bottom:16px}
input[type=text],input[type=password]{width:100%;height:40px;padding:10px 14px;font-size:15px;border:1px solid var(--border);border-radius:var(--r-md);background:#fff;color:var(--text)}
input:focus{outline:2px solid var(--primary);outline-offset:2px;border-color:var(--primary)}
input.invalid{border-color:var(--danger)}
.cap-err{display:none;font-size:13px;line-height:18px;color:var(--danger);margin-top:6px}
.btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;height:40px;padding:0 14px;border-radius:var(--r-md);font-size:15px;font-weight:500;border:1px solid transparent;cursor:pointer;line-height:1;width:100%}
.btn-primary{background:var(--primary);color:#fff}
.btn-primary:hover{background:var(--primary-hover)}
.btn:disabled{background:var(--disabled);color:var(--muted);cursor:not-allowed}
.spinner{width:16px;height:16px;border:2px solid rgba(255,255,255,.5);border-top-color:#fff;border-radius:50%;animation:spin .7s linear infinite;display:none}
@keyframes spin{to{transform:rotate(360deg)}}
.banner{display:none;align-items:flex-start;gap:8px;padding:12px 14px;border-radius:var(--r-md);font-size:14px;line-height:20px;margin-bottom:16px}
.banner-warn{background:#FEF3C7;color:#92400E;border:1px solid #FCD34D}
.banner-err{background:var(--danger-weak);color:#991B1B;border:1px solid #FCA5A5}
.blocked{display:none;text-align:center}
.blocked .ico{font-size:40px}
.blocked h1{margin-top:12px}
.blocked p{color:var(--muted);font-size:14px}
.foot{margin-top:20px;text-align:center;font-size:13px;color:var(--muted)}
/* state visibility */
.form-area .cap-err{display:none}
body[data-state="loading"] .btn-primary .spinner{display:inline-block}
body[data-state="error-auth"] .err-auth{display:block}
body[data-state="error-lock"] .banner-lock{display:flex}
body[data-state="expired"] .banner-expired{display:flex}
body[data-state="blocked"] .form-area{display:none}
body[data-state="blocked"] .blocked{display:block}
</style>
</head>
<body data-state="initial">

<div class="mock-bar">
  <span class="lbl">상태 시연:</span>
  <button data-s="initial" class="active" onclick="setState('initial')">정상(Initial)</button>
  <button data-s="loading" onclick="setState('loading')">Loading</button>
  <button data-s="expired" onclick="setState('expired')">세션만료 안내</button>
  <button data-s="error-auth" onclick="setState('error-auth')">인증 실패(401)</button>
  <button data-s="error-lock" onclick="setState('error-lock')">계정 잠금(423)</button>
  <button data-s="blocked" onclick="setState('blocked')">IP 차단(403)</button>
  <span class="tag">SCR-001 · /admin/login</span>
</div>

<div class="wrap">
  <div class="card">

    <!-- 정상 폼 영역 -->
    <div class="form-area">
      <div class="brand">AccountInterlockHub</div>
      <h1>관리자 로그인</h1>

      <div class="banner banner-warn banner-expired">세션이 만료되어 로그아웃되었습니다. 다시 로그인해 주세요.</div>
      <div class="banner banner-err banner-lock">계정이 잠겼습니다. 잠시 후 다시 시도해 주세요.</div>

      <div class="field">
        <label for="uid">계정 ID</label>
        <input type="text" id="uid" placeholder="계정 ID를 입력하세요" value="admin-operator">
        <div class="cap-err">계정 ID를 입력해주세요.</div>
      </div>

      <div class="field">
        <label for="pw">비밀번호</label>
        <input type="password" id="pw" placeholder="비밀번호" value="samplepassword">
        <div class="cap-err">비밀번호를 입력해주세요.</div>
      </div>

      <div class="cap-err err-auth" role="alert" style="margin-bottom:16px">로그인이 필요합니다. (계정 또는 비밀번호를 확인해 주세요)</div>

      <button class="btn btn-primary" onclick="return false">
        <span class="spinner"></span>
        <span>로그인</span>
      </button>

      <div class="foot">IP 허용 목록 통과 + 로그인 인증 이중 방어 · 문의는 운영 담당자에게</div>
    </div>

    <!-- IP 차단 화면 (서버 가드) -->
    <div class="blocked">
      <div class="ico">🚫</div>
      <h1>접근이 제한되었습니다</h1>
      <p>허용되지 않은 네트워크에서의 접근입니다.<br>관리자 경로는 IP 허용 목록에서만 접근할 수 있습니다.</p>
    </div>

  </div>
</div>

<script>
function setState(s){
  document.body.dataset.state=s;
  document.querySelectorAll('.mock-bar button').forEach(function(b){b.classList.toggle('active',b.dataset.s===s)});
}
</script>
</body>
</html>
